<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Examen: Arquitectura de Ecosistemas de Software</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #fff3e0 50%, #e0f2f1 100%);
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, sans-serif;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-wrapper {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
            background: #fffffff0;
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            padding: 1.8rem;
            transition: all 0.2s;
        }

        .header {
            text-align: center;
            margin-bottom: 1.2rem;
            border-bottom: 4px solid #ff8c42;
            padding-bottom: 0.7rem;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e6f9f, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .sub {
            color: #e67e22;
            font-size: 0.85rem;
            margin-top: 0.2rem;
            font-weight: 600;
        }

        .progress-area {
            background: #e6e0f0;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #1a4a6e;
            font-weight: 700;
        }

        .question-counter {
            font-weight: 800;
            background: #ffcc88;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #5a3a1a;
        }

        .score-badge {
            background: #88ccaa;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 700;
            color: #1a4a2e;
        }

        .question-card {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.3rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border-left: 8px solid #ff8c42;
            border-right: 1px solid #f0e0d0;
        }

        .question-text {
            font-size: 1.08rem;
            font-weight: 800;
            color: #2c3e66;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            cursor: pointer;
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            background: #fefaf5;
            border: 2px solid #e0d0c0;
            transition: all 0.15s;
        }

        .option:hover {
            background: #fff4e6;
            border-color: #ffaa66;
            transform: scale(1.01);
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #e67e22;
            border-radius: 50%;
            margin-top: 0.1rem;
            cursor: pointer;
            background: white;
            flex-shrink: 0;
        }

        input[type="radio"]:checked {
            background-color: #e67e22;
            border-color: #e67e22;
            box-shadow: inset 0 0 0 3px white;
        }

        .option label {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            cursor: pointer;
            color: #2c3e66;
            font-weight: 600;
        }

        .feedback {
            margin-top: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            background: #fef7e8;
            border-left: 5px solid;
            line-height: 1.4;
            color: #2c3e50;
        }

        .feedback.correct {
            border-left-color: #44aa66;
            background: #e0ffe8;
        }

        .feedback.incorrect {
            border-left-color: #ff6666;
            background: #ffe6e6;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            border: none;
            background: #ddd0c0;
            color: #4a3a2a;
            font-weight: 800;
            padding: 0.6rem 1.3rem;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #3a86ff;
            color: white;
        }

        .btn-primary:hover {
            background: #2a6ad0;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #e67e22;
            color: white;
        }

        .btn-secondary:hover {
            background: #d46a10;
        }

        .btn-reset {
            background: #cc6644;
            color: white;
        }

        .btn-reset:hover {
            background: #aa4422;
        }

        .btn-success {
            background: #44aa66;
            color: white;
        }

        .btn-success:hover {
            background: #338855;
        }

        .results-area {
            margin-top: 1.5rem;
            background: #fff2e0;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 2px solid #ffaa33;
            display: none;
        }

        .results-area h3 {
            color: #cc5500;
            margin-bottom: 0.5rem;
        }

        .result-summary {
            font-size: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: bold;
            color: #1f4a2e;
        }

        .result-detail {
            max-height: 280px;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .result-item {
            padding: 0.4rem;
            border-bottom: 1px solid #ffd9a0;
            display: flex;
            gap: 0.5rem;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.2rem;
            color: #aa8855;
        }

        @media (max-width: 600px) {
            .quiz-wrapper {
                padding: 1rem;
            }
            .question-text {
                font-size: 0.98rem;
            }
            .option label {
                font-size: 0.88rem;
            }
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="header">
        <h1>🧩 Arquitectura de Ecosistemas de Software</h1>
        <div class="sub">Software de base, utilitarios, aplicaciones y diagnóstico</div>
    </div>

    <div class="progress-area">
        <span class="question-counter" id="questionCounter">Pregunta 1 / 20</span>
        <span class="score-badge" id="liveScore">✅ Aciertos: 0</span>
    </div>

    <div id="questionContainer"></div>

    <div class="nav-buttons">
        <button id="prevBtn" class="btn btn-secondary">◀ Anterior</button>
        <button id="nextBtn" class="btn btn-primary">Siguiente ▶</button>
        <button id="resetBtn" class="btn btn-reset">⟳ Reiniciar</button>
        <button id="finalScoreBtn" class="btn btn-success">📊 Ver total</button>
    </div>

    <div id="resultsPanel" class="results-area"></div>
    <footer>📌 Selecciona una opción → retroalimentación inmediata. Al finalizar, revisa tu puntuación.</footer>
</div>

<script>
    // ==================== DATOS DEL CUESTIONARIO ====================
    const questionsData = [
        { text: "Durante un análisis forense, se observa que un proceso tiene autoridad para organizar los hilos de ejecución directamente en la CPU. ¿A qué capa pertenece este proceso según la jerarquía de dependencia?",
          options: ["Capa de Aplicaciones (Interfaz de Usuario).", "Capa de Utilitarios (Perímetro de Mantenimiento).", "Capa de Software de Base (Motor del Sistema).", "Capa de Hardware (Drivers físicos)."],
          correct: "c",
          explanation: "Correcta (c): El Software de Base (Kernel/SO) organiza los hilos de ejecución de la CPU. Las aplicaciones y utilitarios dependen de esta capa."
        },
        { text: "Si un sistema operativo inicia correctamente pero el usuario no puede realizar copias de seguridad automáticas ni detectar malware en tiempo real, ¿qué segmento de la arquitectura está fallando?",
          options: ["El Software de Base, debido a una corrupción en el Kernel.", "Los Utilitarios, ya que estas funciones son de mantenimiento y protección.", "Las Aplicaciones, porque el usuario no puede ejecutar su voluntad final.", "El Hardware, específicamente el Chip de Seguridad."],
          correct: "b",
          explanation: "Correcta (b): Las copias de seguridad y la detección de malware son funciones de la capa de Utilitarios. Si el sistema arranca, el Software de Base está operativo."
        },
        { text: "En el 'Anatomía de un Clic', un algoritmo comprime un archivo antes de enviarlo. Si este paso falla pero el sistema operativo sigue asignando CPU con normalidad, ¿cuál es el diagnóstico técnico?",
          options: ["Colapso de la base; el hardware no puede recibir instrucciones.", "Falla en la capa de aplicación; la voluntad del usuario fue ignorada.", "Interrupción en la capa de utilitarios; el servicio de optimización falló.", "Error de driver; la tarjeta Wi-Fi no reconoce el formato comprimido."],
          correct: "c",
          explanation: "Correcta (c): La compresión es una tarea de la capa de Utilitarios que ocurre después de la acción de la aplicación y antes de la gestión del SO."
        },
        { text: "¿Por qué el cierre forzado de `explorer.exe` en Windows provoca el colapso de la interfaz gráfica pero no el apagado del equipo?",
          options: ["Porque es un proceso de aplicación que consume recursos de forma masiva.", "Porque es un proceso del Software de Base del cual depende la interfaz visible.", "Porque es un utilitario de gestión de disco que se detuvo.", "Porque el Kernel NT detecta un error de hardware y bloquea la pantalla."],
          correct: "b",
          explanation: "Correcta (b): `explorer.exe` es un proceso de Software de Base cuya finalización demuestra una dependencia crítica de la interfaz gráfica."
        },
        { text: "Un técnico observa que la CPU está al 100% de uso mientras se realiza una desfragmentación de disco, pero vuelve a la normalidad al terminar. Según el material, esto es un comportamiento esperado de:",
          options: ["El Kernel, que mantiene un control constante y absoluto.", "Una Aplicación de finanzas con alta penetración de datos.", "Un Utilitario, que estresa el hardware bajo demanda para optimizar.", "El Chip de Seguridad validando permisos de acceso."],
          correct: "c",
          explanation: "Correcta (c): Los utilitarios consumen recursos intensivamente solo cuando son invocados para tareas de optimización."
        },
        { text: "Si eliminamos el componente `systemd` en un entorno Linux, ¿cuál sería el resultado según el 'Test del Fallo'?",
          options: ["El sistema funciona lento pero protegido.", "El equipo no arranca (Fallo Crítico).", "El usuario no puede realizar una tarea específica como navegar.", "Se pierden las funciones de compresión de archivos."],
          correct: "b",
          explanation: "Correcta (b): `systemd` es Software de Base para Linux; su eliminación impide que el equipo arranque."
        },
        { text: "¿Cuál es la diferencia fundamental de 'autoridad' entre un navegador web y el Kernel de un sistema?",
          options: ["El navegador gestiona el sistema y el Kernel lo consume.", "El Kernel es el intermediario absoluto con el hardware; el navegador es la interfaz que consume el sistema.", "Los navegadores tienen más autoridad por estar en la cúspide de la pirámide.", "El Kernel solo se encarga de la seguridad, mientras que el navegador organiza los hilos de CPU."],
          correct: "b",
          explanation: "Correcta (b): Las aplicaciones (navegador) son la capa visible pero no gestionan el sistema, lo consumen; el Software de Base es el intermediario absoluto."
        },
        { text: "En la arquitectura de dependencia, si la base colapsa:",
          options: ["Los utilitarios asumen el control del hardware para evitar el cierre.", "Las aplicaciones siguen funcionando de forma independiente en la memoria caché.", "La cúspide (aplicaciones y utilitarios) se derrumba inevitablemente.", "El chip de seguridad reinicia automáticamente el Kernel."],
          correct: "c",
          explanation: "Correcta (c): La jerarquía es absoluta: utilitarios y aplicaciones dependen del software de base; si la base falla, todo lo superior cae."
        },
        { text: "Al instalar un nuevo periférico, el sistema coordina su funcionamiento mediante drivers. ¿En qué sección del Software de Base ocurre esto?",
          options: ["Gestión de Memoria RAM.", "Puertos E/S (Entrada/Salida).", "Sistema de Archivos de Almacenamiento.", "Organización de hilos de la CPU."],
          correct: "b",
          explanation: "Correcta (b): La coordinación de periféricos mediante drivers es una función específica de los Puertos E/S dentro de la capa de Software de Base."
        },
        { text: "Un programa se ejecuta pasivamente en segundo plano consumiendo 0.1 Mbps de red de forma constante. Según el Laboratorio 1, este comportamiento es típico de:",
          options: ["Una Aplicación de entretenimiento.", "El Kernel NT en estado de reposo.", "Un Servicio/Utilitario operando de forma pasiva.", "El hardware de red enviando señales de pulso."],
          correct: "c",
          explanation: "Correcta (c): Los servicios/utilitarios a menudo operan en segundo plano consumiendo recursos pasivamente."
        },
        { text: "¿Qué característica distingue a un 'Utilitario' de una 'Aplicación' en términos de la voluntad del usuario?",
          options: ["El utilitario ejecuta la voluntad final; la aplicación solo mantiene el sistema.", "La aplicación ejecuta la voluntad final del usuario; el utilitario mantiene, protege y optimiza.", "Ambos ejecutan la voluntad final, pero el utilitario tiene acceso directo al hardware.", "No hay diferencia; ambos son términos intercambiables en sistemas modernos."],
          correct: "b",
          explanation: "Correcta (b): El utilitario se encarga del mantenimiento y protección, mientras que la aplicación ejecuta la 'voluntad final del usuario'."
        },
        { text: "Si un disco duro está dañado físicamente y se utiliza una herramienta para analizar y reparar unidades, ¿qué capa de software se está empleando?",
          options: ["Software de Base, porque accede al disco.", "Utilitarios, específicamente en su función de Gestión de Disco.", "Aplicaciones de productividad.", "Capa de Hardware pura, sin intervención de software."],
          correct: "b",
          explanation: "Correcta (b): El análisis y reparación de unidades es una función de la Capa 2: Utilitarios (Gestión de Disco)."
        },
        { text: "Un sistema muestra un mensaje de 'Acceso Denegado' al intentar modificar una carpeta del sistema. ¿Qué componente de la Capa 1 está actuando?",
          options: ["Organización de hilos de ejecución.", "Gestión de memoria RAM.", "Chip de Seguridad / Control de permisos.", "Drivers de almacenamiento."],
          correct: "c",
          explanation: "Correcta (c): El control de permisos de acceso es responsabilidad directa del Chip de Seguridad dentro de la capa de Software de Base."
        },
        { text: "Según la metodología de laboratorio, para comprender el impacto de un software en un entorno real, el paso de 'Práctica' consiste en:",
          options: ["Explicar la función estructural.", "Identificar el software en una lista.", "Alterar variables y observar el impacto.", "Leer las conclusiones y próximas fronteras."],
          correct: "c",
          explanation: "Correcta (c): La metodología define la 'Práctica (Medición)' como alterar variables y observar el impacto en el sistema."
        },
        { text: "En el ecosistema Android, ¿cuál de los siguientes es el componente de Software de Base?",
          options: ["AVG Mobile.", "Instagram.", "Linux Kernel.", "WhatsApp."],
          correct: "c",
          explanation: "Correcta (c): La matriz de diagnóstico sitúa al Linux Kernel como el Software de Base para el entorno Android."
        },
        { text: "¿Qué sucede con el hardware si se elimina por completo la Capa 1 (Software de Base)?",
          options: ["El hardware opera de forma básica mediante la BIOS.", "El hardware queda inerte.", "Los utilitarios toman el control de los puertos E/S.", "Las aplicaciones acceden directamente a la CPU."],
          correct: "b",
          explanation: "Correcta (b): El material afirma textualmente que sin la capa de Software de Base, 'el hardware es inerte'."
        },
        { text: "Un usuario reporta que no puede enviar un correo porque el archivo adjunto es muy grande. El técnico sugiere usar una herramienta de compresión. ¿Qué está recomendando el técnico en términos de capas?",
          options: ["Mejorar la Capa 1 para que el Kernel asigne más memoria.", "Utilizar un componente de la Capa 2 para reducir el tamaño del archivo.", "Instalar una nueva Capa 3 para cambiar la interfaz de usuario.", "Reemplazar el hardware para aumentar la capacidad de red."],
          correct: "b",
          explanation: "Correcta (b): La reducción del tamaño de archivos es una función de los Utilitarios de Compresión (Capa 2)."
        },
        { text: "En el Administrador de Tareas, las aplicaciones suelen encabezar la lista de consumo de recursos. ¿A qué se debe esto según el material?",
          options: ["A que son las encargadas de gestionar el sistema.", "A que son la capa más visible y consumen el sistema para cumplir la voluntad del usuario.", "A que contienen los drivers necesarios para el hardware.", "A un error de prioridad en el Software de Base."],
          correct: "b",
          explanation: "Correcta (b): Las aplicaciones son la capa más visible y su función es consumir el sistema para cumplir la voluntad del usuario."
        },
        { text: "¿Cuál es el orden jerárquico estricto de programas que se inicia al encender un dispositivo?",
          options: ["Aplicación -> Utilitario -> Software de Base.", "Software de Base -> Utilitario -> Aplicación.", "Utilitario -> Software de Base -> Aplicación.", "El orden es aleatorio dependiendo de la velocidad del procesador."],
          correct: "b",
          explanation: "Correcta (b): El orden de inicio es: Software de Base → Utilitarios → Aplicaciones."
        },
        { text: "Si un técnico desea crear entornos seguros para probar otros Sistemas Operativos, ¿cuál es el siguiente paso sugerido por el material?",
          options: ["Usar Terminal Linux para borrar el Kernel.", "Configurar Máquinas Virtuales.", "Instalar nuevos Utilitarios de Red.", "Comprimir el sistema de archivos actual."],
          correct: "b",
          explanation: "Correcta (b): En las 'Próximas Fronteras Sugeridas', se menciona que las Máquinas Virtuales sirven para crear entornos seguros donde probar Sistemas Operativos."
        }
    ];

    let userAnswers = new Array(20).fill(null);
    let currentIndex = 0;

    const questionContainer = document.getElementById('questionContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const finalScoreBtn = document.getElementById('finalScoreBtn');
    const questionCounterSpan = document.getElementById('questionCounter');
    const liveScoreSpan = document.getElementById('liveScore');
    const resultsPanel = document.getElementById('resultsPanel');

    function updateLiveScore() {
        let correctCount = 0;
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] && userAnswers[i] === questionsData[i].correct) correctCount++;
        }
        liveScoreSpan.textContent = `✅ Aciertos: ${correctCount} / 20`;
        return correctCount;
    }

    function saveAnswer(selectedLetter) {
        userAnswers[currentIndex] = selectedLetter;
        updateLiveScore();
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        const q = questionsData[currentIndex];
        const selected = userAnswers[currentIndex];
        const letters = ['a', 'b', 'c', 'd'];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            const isChecked = (selected === letter);
            optionsHtml += `
                <div class="option" data-letter="${letter}">
                    <input type="radio" name="question" value="${letter}" id="opt_${letter}" ${isChecked ? 'checked' : ''}>
                    <label for="opt_${letter}"><strong>${letter.toUpperCase()})</strong> ${opt}</label>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (selected) {
            const isCorrect = (selected === q.correct);
            const correctLetter = q.correct;
            const correctText = q.options[letters.indexOf(correctLetter)];
            const explanation = q.explanation;
            if (isCorrect) {
                feedbackHtml = `<div class="feedback correct">✅ <strong>¡Correcto!</strong> ${explanation}</div>`;
            } else {
                feedbackHtml = `<div class="feedback incorrect">❌ <strong>Incorrecto.</strong> La respuesta correcta es ${correctLetter.toUpperCase()}) ${correctText}.<br>${explanation}</div>`;
            }
        } else {
            feedbackHtml = `<div class="feedback" style="border-left-color:#ffcc88; background:#fff5e6;">⚡ Selecciona una opción para ver la retroalimentación.</div>`;
        }

        const html = `
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
            </div>
        `;
        questionContainer.innerHTML = html;

        // Event listeners para opciones
        const optionDivs = document.querySelectorAll('.option');
        optionDivs.forEach(div => {
            const radio = div.querySelector('input[type="radio"]');
            const letter = div.getAttribute('data-letter');
            if (radio) {
                radio.addEventListener('change', () => {
                    if (radio.checked) saveAnswer(letter);
                });
            }
            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const radioInside = div.querySelector('input');
                    if (radioInside && !radioInside.checked) {
                        radioInside.checked = true;
                        saveAnswer(letter);
                    }
                }
            });
        });

        questionCounterSpan.textContent = `Pregunta ${currentIndex+1} / 20`;
    }

    function showFinalResults() {
        let correctCount = 0;
        let detailsHtml = '';
        for (let i = 0; i < questionsData.length; i++) {
            const q = questionsData[i];
            const userAns = userAnswers[i];
            const isCorrect = (userAns === q.correct);
            if (isCorrect) correctCount++;
            const statusIcon = isCorrect ? '✅' : '❌';
            const userShow = userAns ? userAns.toUpperCase() : '—';
            const correctShow = q.correct.toUpperCase();
            detailsHtml += `
                <div class="result-item">
                    <span style="min-width: 30px;">${statusIcon}</span>
                    <span><strong>Pregunta ${i+1}</strong> (Tu respuesta: ${userShow} / Correcta: ${correctShow})</span>
                </div>
            `;
        }
        const percent = Math.round((correctCount / 20) * 100);
        resultsPanel.innerHTML = `
            <h3>📊 Resultado final</h3>
            <div class="result-summary">🎯 Aciertos: ${correctCount} de 20 (${percent}%)</div>
            <div class="result-detail">${detailsHtml}</div>
            <button id="closeResultsBtn" class="btn btn-secondary" style="margin-top: 10px; width:100%;">✖ Cerrar resumen</button>
        `;
        resultsPanel.style.display = 'block';
        document.getElementById('closeResultsBtn')?.addEventListener('click', () => {
            resultsPanel.style.display = 'none';
        });
        alert(`📊 Cuestionario completado.\nAciertos: ${correctCount} de 20 (${percent}%)\nRevisa el resumen detallado en pantalla.`);
    }

    function nextQuestion() {
        if (currentIndex < 19) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                if (confirm(`Aún tienes ${unanswered} pregunta(s) sin responder. ¿Deseas finalizar de todas formas? Las no respondidas se contarán como incorrectas.`)) {
                    showFinalResults();
                }
            } else {
                showFinalResults();
            }
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        } else {
            alert("Ya estás en la primera pregunta.");
        }
    }

    function resetQuiz() {
        if (confirm("¿Reiniciar todo el cuestionario? Se perderán todas las respuestas.")) {
            userAnswers = new Array(20).fill(null);
            currentIndex = 0;
            resultsPanel.style.display = 'none';
            updateLiveScore();
            renderCurrentQuestion();
        }
    }

    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);
    resetBtn.addEventListener('click', resetQuiz);
    finalScoreBtn.addEventListener('click', showFinalResults);

    renderCurrentQuestion();
    updateLiveScore();
</script>
</body>
</html>
